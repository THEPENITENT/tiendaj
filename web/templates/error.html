{% extends "base.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<div class="form-card" style="text-align: center; padding: 3rem;">
    <h1 style="color: var(--red);">Error de Conexión</h1>
    <p style="margin-top: 1rem; color: var(--text-muted);">{{ msg }}</p>
    <p style="margin-top: 0.5rem; color: var(--text-muted);">Verifica que MariaDB esté corriendo: <code>sudo systemctl start mariadb</code></p>
</div>
{% endblock %}
