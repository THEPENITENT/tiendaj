<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIENDAJ - {% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">TIENDAJ</a>
        <div class="nav-links">
            <a href="/" class="{{ 'active' if request.endpoint == 'index' }}">Dashboard</a>
            <a href="/videojuegos" class="{{ 'active' if request.endpoint == 'videojuegos' }}">Videojuegos</a>
            <a href="/clientes" class="{{ 'active' if request.endpoint == 'clientes' }}">Clientes</a>
            <a href="/ventas" class="{{ 'active' if request.endpoint == 'ventas' }}">Ventas</a>
        </div>
    </nav>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        TIENDAJ &copy; 2026 — Sistema de Gestión para Tienda de Videojuegos
    </footer>
</body>
</html>
